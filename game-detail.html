<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chi Tiết Game</title>
    <style>
      :root {
        --bg: #07111f;
        --panel: rgba(15, 23, 42, 0.92);
        --primary: #7c3aed;
        --secondary: #06b6d4;
        --accent: #f59e0b;
        --text: #f8fafc;
        --muted: #94a3b8;
        --border: rgba(255, 255, 255, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #07111f, #111827 65%, #1f2937);
        color: var(--text);
        min-height: 100vh;
      }

      .container {
        width: min(1100px, calc(100% - 32px));
        margin: 0 auto;
        padding: 28px 0 40px;
      }

      .back {
        display: inline-block;
        margin-bottom: 16px;
        color: #cbd5e1;
        text-decoration: none;
        font-weight: 600;
      }

      .back:hover {
        color: var(--accent);
      }

      .hero {
        background: linear-gradient(
          120deg,
          rgba(7, 89, 133, 0.95),
          rgba(124, 58, 237, 0.95)
        );
        border: 1px solid var(--border);
        border-radius: 24px;
        overflow: hidden;
        box-shadow: 0 20px 50px rgba(0, 0, 0, 0.24);
      }

      .hero img {
        width: 100%;
        height: 320px;
        object-fit: cover;
        display: block;
      }

      .hero-content {
        padding: 24px;
      }

      .hero-content h1 {
        margin: 0 0 10px;
        font-size: 2rem;
      }
      .hero-content p {
        margin: 0 0 14px;
        line-height: 1.7;
        color: #e2e8f0;
      }

      .pill {
        display: inline-block;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.15);
        margin-right: 8px;
        margin-bottom: 8px;
        font-size: 0.9rem;
      }

      .grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 20px;
        margin-top: 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
      }

      .panel h2 {
        margin-top: 0;
        font-size: 1.2rem;
      }
      .panel p,
      .panel li {
        color: var(--muted);
        line-height: 1.7;
      }
      .panel ul {
        padding-left: 18px;
      }

      .stats {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }

      .stats span {
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(245, 158, 11, 0.16);
        color: #fde68a;
      }

      @media (max-width: 800px) {
        .grid {
          grid-template-columns: 1fr;
        }
        .hero img {
          height: 240px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <a class="back" href="index.html">← Quay lại bảng tin</a>
      <section class="hero" id="detailHero"></section>
      <section class="grid">
        <div class="panel" id="communityPanel"></div>
        <div class="panel" id="historyPanel"></div>
      </section>
    </div>

            "Cộng đồng sáng tạo giúp game tiếp tục phát triển theo nhiều hướng.",
          ],
        },
        "honkai-star-rail": {
          title: "Honkai: Star Rail",
          image:
            "https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=1200&q=80",
          tag: "RPG / Story",
          summary:
            "Honkai: Star Rail là game nhập vai theo phong cách hành trình không gian với câu chuyện hấp dẫn và chiến đấu thú vị.",
          highlight: [
            "Câu chuyện sâu sắc",
            "Nhân vật ấn tượng",
            "Hệ thống chiến đấu mạnh mẽ",
          ],
          community: [
            "Cộng đồng fan đông đảo trên mạng xã hội và Discord.",
            "Nhiều người chơi theo dõi các bản cập nhật và sự kiện mới.",
            "Game nhận được phản hồi tích cực nhờ nhịp độ phát triển rõ ràng.",
          ],
          history: [
            "Ra mắt gần đây nhưng đã nhanh chóng thu hút sự chú ý lớn.",
            "Phát triển bởi miHoYo với phong cách nghệ thuật riêng biệt.",
            "Game tiếp tục mở rộng nội dung và nâng cấp trải nghiệm người chơi.",
          ],
        },
      };

      const params = new URLSearchParams(window.location.search);
      const slug = params.get("game") || "valorant";
      const game = gameDetails[slug];

      if (game) {
        document.title = `${game.title} | Chi Tiết Game`;
        document.getElementById("detailHero").innerHTML = `
          <img src="${game.image}" alt="${game.title}" />
          <div class="hero-content">
            <span class="pill">${game.tag}</span>
            <h1>${game.title}</h1>
            <p>${game.summary}</p>
            <div class="stats">
              ${game.highlight.map((item) => `<span>${item}</span>`).join("")}
            </div>
          </div>
        `;

        document.getElementById("communityPanel").innerHTML = `
          <h2>💬 Cộng đồng của game</h2>
          <ul>
            ${game.community.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        `;

        document.getElementById("historyPanel").innerHTML = `
          <h2>🕰️ Lịch sử phát triển</h2>
          <ul>
            ${game.history.map((item) => `<li>${item}</li>`).join("")}
          </ul>
        `;
      } else {
        document.getElementById("detailHero").innerHTML =
          "<div class='hero-content'><h1>Không tìm thấy game</h1></div>";
      }
    </script>
  </body>
</html>
